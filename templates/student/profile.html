{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-lines-fill me-2"></i>Edit Profile</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" value="{{ current_user.name }}" disabled readonly>
                        <div class="form-text">Name cannot be changed.</div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text" class="form-control" value="{{ student.roll_number }}" disabled readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Current CGPA</label>
                            <input type="number" step="0.01" name="cgpa" class="form-control" value="{{ student.cgpa }}"
                                required min="0" max="10">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Skills</label>
                        <textarea name="skills" class="form-control" rows="3"
                            placeholder="Python, Flask, Java, Data Analysis...">{{ student.skills or '' }}</textarea>
                        <div class="form-text">Functionality: Recruiters can view these skills. Separate with commas.
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Resume Link (Google Drive/Dropbox)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                            <input type="url" name="resume_link" class="form-control" placeholder="https://..."
                                value="{{ student.resume_link or '' }}">
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success"><i class="bi bi-save me-2"></i>Save
                            Changes</button>
                        <a href="{{ url_for('student.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
