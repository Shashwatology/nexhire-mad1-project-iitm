{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center pt-4">
    <div class="col-md-8">
        <div class="card border border-dark rounded-0 shadow-none mb-4">
            <div class="card-header bg-white border-bottom border-dark">
                <h4 class="mb-0">Update Applications: {{ drive.name }}</h4>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered border-secondary mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th scope="col" style="width: 10%;">Sr No.</th>
                            <th scope="col">Student Name</th>
                            <th scope="col" class="text-end" style="width: 30%;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for app in applications %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{ app.student.user.name }}</td>
                            <td class="text-end">
                                <a href="{{ url_for('company.review_application', app_id=app.id) }}"
                                    class="btn btn-outline-primary btn-sm rounded-0 px-3">review application</a>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3" class="text-center py-4 text-muted">No applications received yet.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-dark px-4 rounded-0 border-dark">Back to
                Dashboard</a>
            <button class="btn btn-outline-success px-5 rounded-0 border-success">Save</button>
        </div>
    </div>
</div>
{% endblock %}
